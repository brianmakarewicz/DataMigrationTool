name: Automated PR review

# Reviews every pull request the moment it opens or updates.
# Identity split: the review/approval posts as brianmakarewicz (DMT_REVIEWER_PAT,
# a fine-grained token that can only read code and write pull-request reviews);
# the merge is performed by the workflow's own GitHub token after approval.
# Claude usage bills to the subscription behind CLAUDE_CODE_OAUTH_TOKEN.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        env:
          REVIEWER_TOKEN: ${{ secrets.DMT_REVIEWER_PAT }}
          MERGE_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools "Bash,Read,Grep,Glob" --max-turns 50'
          prompt: |
            You are the automated pull-request reviewer for this repository (an Oracle
            PL/SQL data-migration tool: staging/transform tables, FBDI and HDL file
            generation, an execution queue, BIP reconciliation against Oracle Fusion).
            You did not author this change - judge it independently. Do not modify files.

            Review PR number $PR_NUMBER on $REPO.

            IDENTITY RULES:
            - All review reads and review posts use the reviewer token:
              GH_TOKEN="$REVIEWER_TOKEN" gh <command>
              First verify: GH_TOKEN="$REVIEWER_TOKEN" gh api user --jq .login
              must print brianmakarewicz. STOP with an error if it does not.
            - The merge (only after an approval) uses the workflow token instead:
              GH_TOKEN="$MERGE_TOKEN" gh pr merge ...

            PROCESS:
            1. Read the full diff: GH_TOKEN="$REVIEWER_TOKEN" gh pr diff $PR_NUMBER
               Read surrounding code from the checkout for context.
            2. Review for: correctness bugs, logic errors, SQL mistakes, broken or
               weakened test assertions, security problems (credentials committed,
               injection), anything that would break the install or the pipeline.
            3. Enforce the repository standards (docs/coding-standards.md and
               docs/tranche-reviews/):
               (1) no EXECUTE IMMEDIATE / dynamic SQL in any database object EXCEPT the
                   three named procedures in DMT_QUEUE_WORKER_PKG (invoke_registered,
                   ACCOUNT_ROWS, MARK_GENERATED_ROWS_FAILED);
               (2) no ALTER SESSION NLS - explicit format masks on every TO_CHAR/TO_DATE;
               (3) no LIKE pattern-matching on object codes or status values;
               (4) all DDL guarded and idempotent (safe to re-run);
               (5) ERROR_TEXT appended, never overwritten;
               (6) no credentials or passwords in committed files;
               (7) unit tests self-clean and hard-fail on assertion errors;
               (8) status values only from the seeded canonical sets.
            4. Verdict:
               - Clean: post the approval as the reviewer:
                 GH_TOKEN="$REVIEWER_TOKEN" gh pr review $PR_NUMBER --approve --body
                 "AUTOMATED APPROVAL - this review was performed by the DMT automated
                 review agent operating under the brianmakarewicz account, not by a
                 human. <one-paragraph summary of what was checked and why it is safe>"
                 Then merge as the workflow:
                 GH_TOKEN="$MERGE_TOKEN" gh pr merge $PR_NUMBER --squash --delete-branch
                 If the merge is rejected, post a comment explaining why and stop -
                 never force.
               - Problems: GH_TOKEN="$REVIEWER_TOKEN" gh pr review $PR_NUMBER
                 --request-changes --body "AUTOMATED REVIEW - changes requested by the
                 DMT automated review agent operating under the brianmakarewicz account,
                 not by a human. <numbered findings with file and line references>"
               - Genuinely uncertain: request changes. Never guess-approve.
               - Minor style nits alone are not blocking - mention them in the approval
                 text and still approve.
            5. Finish by printing one line: the PR number and the action taken.
